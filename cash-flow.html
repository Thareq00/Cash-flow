<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Cash Flow</title>

    <link
        rel="stylesheet"
        href="cash-flow.css"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <!-- HEADER -->
    <header class="top-bar">

        <div>

            <h2>
                💳 Cash Flow
            </h2>

            <p id="nama-user">
                Hi User
            </p>

        </div>

    </header>

    <!-- SUMMARY -->
    <section class="summary-box">

        <div class="summary-card total">

            <p>Total Balance</p>

            <h1 id="saldo">
                Rp 0
            </h1>

        </div>

        <div class="summary-card masuk">

            <p>Income</p>

            <h2 id="total-masuk">
                Rp 0
            </h2>

        </div>

        <div class="summary-card keluar">

            <p>Expense</p>

            <h2 id="total-keluar">
                Rp 0
            </h2>

        </div>

    </section>

    <!-- ACTION -->
    <section class="quick-action">

        <button
            onclick="setMode('masuk')"
        >
            💰 Income
        </button>

        <button
            onclick="setMode('keluar')"
        >
            💸 Expense
        </button>

    </section>

    <!-- FORM -->
    <section class="card form-box">

        <div class="form-header">

            <h3 id="form-title">
                Add Transaction
            </h3>

        </div>

        <form id="cashForm">

            <input
                type="text"
                id="keterangan"
                placeholder="Transaction Description"
                required
            >

            <input
                type="number"
                id="jumlah"
                placeholder="Amount"
                required
            >

            <select id="tipe">

                <option value="masuk">
                    💰 Income
                </option>

                <option value="keluar">
                    💸 Expense
                </option>

            </select>

            <button type="submit">

                Save Transaction

            </button>

        </form>

    </section>

    <!-- HISTORY -->
    <section class="card list-box">

        <div class="list-header">

            <h3>
                Transaction History
            </h3>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>No</th>

                        <th>Description</th>

                        <th>Type</th>

                        <th>Amount</th>

                        <th>Date</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="data-transaksi">

                </tbody>

            </table>

        </div>

    </section>

    <script src="cash-flow.js"></script>

</body>
</html>
